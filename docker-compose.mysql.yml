services:

  vc-db:
    image: mysql:${MYSQL_VERSION:-9.3}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      - MYSQL_DATABASE=VirtoCommerce3
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-v!rto_Labs!}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - virto

  vc-platform-web:
    environment:
      - DatabaseProvider=MySql
      - ConnectionStrings:VirtoCommerce=Server=vc-db;Port=3306;Database=VirtoCommerce3;User=root;Password=${DB_PASSWORD:-v!rto_Labs!}
    depends_on:
      - vc-db
      - es
      - redis
    entrypoint: ["/wait-for-it.sh", "vc-db:3306", "-t", "120", "--", "/wait-for-it.sh", "es:9200", "-t", "120", "--", "/wait-for-it.sh", "redis:6379", "-t", "120", "--", "dotnet", "VirtoCommerce.Platform.Web.dll"]

volumes:
  mysql_data:
    driver: local

networks:
  virto:
