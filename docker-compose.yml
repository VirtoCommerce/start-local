services:

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-v!rto_Labs!}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_REPLICATION_MODE=master
    volumes:
      - redisdata:/data
    networks:
      - virto

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-8.18.0}
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
    networks:
      - virto
    environment:
      - node.name=es
      - cluster.name=${ES_CLUSTER_NAME:-elasticsearch}
      - cluster.initial_master_nodes=es
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-v!rto_Labs!}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.license.self_generated.type=${ES_LICENSE:-basic}
      - xpack.ml.use_auto_machine_memory_percent=true
    restart: "on-failure"
    mem_limit: ${ES_MEM_LIMIT:-1g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:9200",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-8.18.0}
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - virto
    environment:
      - ELASTICSEARCH_HOSTS=http://es:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-Kibana-v!rto_Labs!}
      - XPACK_SECURITY_ENABLED=false
    depends_on:
      - es
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:5601/api/status",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  vc-frontend:
    depends_on:
      - vc-platform-web
    image: vc-frontend:local-latest
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - virto

  vc-platform-web:
    image: vc-platform:local-latest
    ports:
      - "${PLATFORM_PORT:-8090}:80"
    environment:
      - ASPNETCORE_URLS=http://+
      - VirtoCommerce:AllowInsecureHttp=true
      - VirtoCommerce:Hangfire:JobStorageType=Memory
      - Assets:FileSystem:PublicUrl=http://localhost:${PLATFORM_PORT:-8090}/assets/
      - Content:FileSystem:PublicUrl=http://localhost:${PLATFORM_PORT:-8090}/cms-content/
      - Search:Provider=ElasticSearch8
      - Search:ElasticSearch8:Server=http://es:9200
      - Search:ElasticSearch8:User=elastic
      - Search:ElasticSearch8:Key=${ELASTIC_PASSWORD:-v!rto_Labs!}
      - Search:ElasticSearch8:EnableCompatibilityMode=true
    depends_on:
      - es
      - redis
    volumes:
      - cms-content-volume:/opt/virtocommerce/platform/wwwroot/cms-content
      - modules-volume:/opt/virtocommerce/platform/modules
    networks:
      - virto
    restart: unless-stopped

volumes:
  cms-content-volume:
    name: cms-content-data
  modules-volume:
    name: modules-data
  esdata01:
    driver: local
  redisdata:
    driver: local

networks:
  virto:
