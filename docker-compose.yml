services:

  vc-db:
    image: postgres:${PGSQL_VERSION:-16.9}
    ports:
      - "${PGSQL_PORT:-5432}:5432"
    environment: 
      - POSTGRES_DB=VirtoCommerce3
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-v1rto_Labs1}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - virto

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-v1rto_Labs1}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_REPLICATION_MODE=master
    volumes:
      - redisdata:/data
    networks:
      - virto

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-8.18.0}
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
    networks:
      - virto
    environment:
      - node.name=es
      - cluster.name=${ES_CLUSTER_NAME:-elasticsearch}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD:-v1rto_Labs1}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-v1rto_Labs1}
      - bootstrap.memory_lock=true
      - xpack.security.enabled=true
      - xpack.license.self_generated.type=${ES_LICENSE:-basic}
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    restart: "on-failure"
    mem_limit: ${ES_MEM_LIMIT:-1g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --fail -u elastic:$$ELASTIC_PASSWORD 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' > /dev/null",
        ]
      interval: 10s
      timeout: 10s
      retries: 120

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-8.18.0}
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - virto
    environment:
      - ELASTICSEARCH_HOSTS=http://es:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-v1rto_Labs1}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-v1rto_Labs1}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD:-v1rto_Labs1}
      - XPACK_REPORTING_ENCRYPTIONKEY=${ENCRYPTION_KEY:-}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${ENCRYPTION_KEY:-}
      - XPACK_SECURITY_ENCRYPTIONKEY=${ENCRYPTION_KEY:-}
    depends_on:
      - es
    command: |
      bash -c '
        password_set=false
        for i in {1..6}; do
          echo "Waiting for Elasticsearch... attempt $$i/6"
          if curl -s -u "elastic:$$ELASTIC_PASSWORD" http://es:9200 >/dev/null 2>&1; then
            echo "Elasticsearch ready!"
            if curl -sS -X POST "http://es:9200/_security/user/kibana_system/_password" -H "Content-Type: application/json" -u "elastic:$$ELASTIC_PASSWORD" -d "{\"password\":\"$$KIBANA_PASSWORD\"}" >/dev/null 2>&1; then
              echo "Password set successfully"
              password_set=true
              break
            else
              echo "Failed to set password, will retry..."
            fi
          fi
          sleep 30
        done
        if [ "$$password_set" != "true" ]; then
          echo "ERROR: Failed to set kibana_system password after all retries. Exiting."
          exit 1
        fi
        exec /usr/local/bin/kibana-docker
        '
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s http://localhost:5601/api/status",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
  
  vc-frontend:
    depends_on:
      - vc-platform-web
    image: vc-frontend:local-latest
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - virto

  vc-platform-web:
    image: vc-platform:local-latest
    ports:
      - "${PLATFORM_PORT:-8090}:80"
    environment:
      - ASPNETCORE_URLS=http://+
      - VirtoCommerce:AllowInsecureHttp=true
      - VirtoCommerce:Hangfire:JobStorageType=Memory
      - DatabaseProvider=PostgreSql
      - ConnectionStrings:VirtoCommerce=User ID=postgres;Password=${DB_PASSWORD:-v1rto_Labs1};Host=vc-db;Port=5432;Database=VirtoCommerce3
      - Assets:FileSystem:PublicUrl=http://localhost:${PLATFORM_PORT:-8090}/assets/
      - Content:FileSystem:PublicUrl=http://localhost:${PLATFORM_PORT:-8090}/cms-content/
      - Search:Provider=ElasticSearch8
      - Search:ElasticSearch8:Server=http://es:9200
      - Search:ElasticSearch8:User=elastic
      - Search:ElasticSearch8:Key=${ELASTIC_PASSWORD:-v1rto_Labs1}
      - Search:ElasticSearch8:EnableCompatibilityMode=true
    depends_on:
      - vc-db
      - es
      - redis
    entrypoint: ["/wait-for-it.sh", "vc-db:5432", "-t", "120", "--", "/wait-for-it.sh", "es:9200", "-t", "120", "--", "/wait-for-it.sh", "redis:6379", "-t", "120", "--", "dotnet", "VirtoCommerce.Platform.Web.dll"]
    volumes:
      - cms-content-volume:/opt/virtocommerce/platform/wwwroot/cms-content
      - modules-volume:/opt/virtocommerce/platform/modules
    networks:
      - virto
    restart: unless-stopped

volumes:
  cms-content-volume:
    name: cms-content-data
  modules-volume:
    name: modules-data
  postgres_data:
    driver: local
  esdata01:
    driver: local
  redisdata:
    driver: local

networks:
  virto:
